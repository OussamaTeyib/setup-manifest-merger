name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run all

      - name: Ensure dist is up to date
        run: |
          git diff --exit-code dist/ || (
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            exit 1
          )